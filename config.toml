[run]
name = "m1_360_demo"
output_root = "outputs"
seed = 1234
device = "cuda"
dtype = "float16"

[prompt]
text = "A cozy modern living room with warm wood textures, soft daylight, indoor plants, wide-angle interior photography"
negative = "blurry, distorted, duplicated objects, watermark, text, logo, fisheye artifacts"

[models]
text2img = "stabilityai/stable-diffusion-2-1-base"
inpaint = "stabilityai/stable-diffusion-2-inpainting"
scheduler = "dpmpp_2m"
local_files_only = false

[generation]
view_size = 512
num_inference_steps = 30
guidance_scale = 7.5
init_num_inference_steps = 35
init_guidance_scale = 8.0
strength = 0.85

[panorama]
width = 2048
height = 1024
hfov_deg = 90.0
pitch_deg = 0.0
yaw_start_deg = 0.0
yaw_step_deg = 45.0
num_views = 8

[mask]
dilate_px = 21
blur_px = 13
min_fill_ratio = 0.02
